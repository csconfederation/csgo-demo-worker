name: CSGO Demo Worker Pipeline

on:
  push:
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]

jobs:
  detect-changes:
    runs-on: [self-hosted, monkas]
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changes outside specified extensions and directories
        id: filter
        uses: dorny/paths-filter@v4
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!.gitignore'

  build-deploy-notify:
    needs: [detect-changes, test]
    if: always()
    uses: csconfederation/core-infra/.github/workflows/reusable-build-deploy.yml@main
    with:
      image-name: ghcr.io/csconfederation/CSC-Core
      test-result: ${{ needs.test.result }}
      detect-result: ${{ needs.detect-changes.result }}
    secrets:
      DEPLOY_PAT: ${{ secrets.DEPLOY_PAT }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}